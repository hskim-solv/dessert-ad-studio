apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      containers:
        - name: app
          image: dessert-ad-studio-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8501
          env:
            - name: API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: API_BASE_URL
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          volumeMounts:
            - name: outputs
              mountPath: /app/outputs
              subPath: outputs
      volumes:
        - name: outputs
          persistentVolumeClaim:
            claimName: outputs
---
apiVersion: v1
kind: Service
metadata:
  name: app
spec:
  selector:
    app: app
  ports:
    - name: http
      port: 8501
      targetPort: http
