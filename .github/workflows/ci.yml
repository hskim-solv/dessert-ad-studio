name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: pip install -e ".[dev]"
      - run: npm ci --no-audit --no-fund
      - run: ruff check .
      - run: ruff format --check .
      - run: pytest -q
      - name: Agentic RAG eval guardrail gate
        run: >
          python scripts/agentic_rag_eval_guardrail.py
          --output /tmp/agentic-rag-eval-guardrail-summary.json
      - name: Agentic RAG promptfoo package gate
        run: >
          python scripts/agentic_rag_promptfoo_package_smoke.py
          --summary-output /tmp/agentic-rag-promptfoo-package-summary.json
          --results-output /tmp/agentic-rag-promptfoo-results.json
          --timeout-seconds 180
      - name: Agentic RAG final readiness gate
        run: >
          python scripts/build_agentic_rag_final_readiness.py
          --summary-output /tmp/agentic-rag-final-readiness-summary.json
          --report-output /tmp/agentic-rag-final-readiness.md
      - run: docker build -f Dockerfile.api -t dessert-ad-studio-api:ci .
      - name: API smoke
        run: |
          uvicorn api.main:app --host 127.0.0.1 --port 8000 &
          SERVER_PID=$!
          trap "kill ${SERVER_PID}" EXIT
          python scripts/api_smoke.py --base-url http://127.0.0.1:8000
      - run: docker compose config
