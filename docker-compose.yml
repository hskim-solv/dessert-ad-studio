services:
  triton:
    image: ${TRITON_IMAGE:-nvcr.io/nvidia/tritonserver:22.12-py3}
    command: ["tritonserver", "--model-repository=/models"]
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
    volumes:
      - ./models:/models:ro

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      TRITON_URL: triton:8000
      REQUIRE_TRITON: "1"
      COPY_BACKEND: ${COPY_BACKEND:-mock}
      COPY_MODEL_ID: ${COPY_MODEL_ID:-gpt-5.4-mini}
      IMAGE_BACKEND: ${IMAGE_BACKEND:-mock}
      IMAGE_MODEL_ID: ${IMAGE_MODEL_ID:-gpt-image-1-mini}
      IMAGE_QUALITY: ${IMAGE_QUALITY:-low}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OUTPUT_DIR: /app/outputs
      GENERATION_LOG_PATH: /app/logs/generations.jsonl
    ports:
      - "8080:8000"
    volumes:
      - ./outputs:/app/outputs
      - ./logs:/app/logs
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/readyz', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    depends_on:
      triton:
        condition: service_started

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    environment:
      API_BASE_URL: http://api:8000
    ports:
      - "8501:8501"
    volumes:
      - ./outputs:/app/outputs
    depends_on:
      api:
        condition: service_healthy
